<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Admin System - Black & Gold</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Palatino', serif;
            background: #0a0a0a;
            color: #d4af37;
            min-height: 100vh;
            padding: 1rem;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border: 2px solid #d4af37;
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.3);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-title h1 {
            font-size: 2rem;
            color: #d4af37;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .header-title p {
            color: #b8941f;
            font-style: italic;
            margin-top: 0.25rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .notification-btn {
            position: relative;
            background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
            color: #000000;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.25rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .notification-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
            padding: 1.5rem;
            border-radius: 1rem;
            color: #000000;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            transform: translate(30%, -30%);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0.5rem 0;
        }

        .stat-label {
            opacity: 0.9;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .controls {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border: 2px solid #d4af37;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        .controls-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            border: 2px solid #3a3a3a;
            background: #0a0a0a;
            border-radius: 0.75rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.3s;
            color: #b8941f;
            font-family: 'Georgia', serif;
        }

        .filter-btn:hover {
            border-color: #d4af37;
            color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
            color: #000000;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .tabs {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border: 2px solid #d4af37;
            border-radius: 1rem;
            padding: 0.5rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        .tab-btn {
            padding: 1rem 1.5rem;
            border: none;
            background: transparent;
            border-radius: 0.75rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            color: #b8941f;
            transition: all 0.3s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Georgia', serif;
        }

        .tab-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
            color: #000000;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .content {
            display: none;
        }

        .content.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border: 2px solid #d4af37;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
            transition: all 0.3s;
            opacity: 0;
            animation: fadeInUp 0.5s forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.4);
            border-color: #ffd700;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: #d4af37;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge {
            padding: 0.375rem 0.875rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-pending {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #000000;
        }

        .badge-verified {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #000000;
        }

        .badge-priority {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .card-body {
            margin-bottom: 1rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.625rem 0;
            border-bottom: 1px solid #2a2a2a;
            font-size: 0.875rem;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #b8941f;
            font-weight: 500;
        }

        .info-value {
            color: #d4af37;
            font-weight: 600;
            text-align: right;
        }

        .rating {
            color: #ffd700;
        }

        .amount {
            color: #ffd700;
            font-size: 1.125rem;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #d4af37;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: 'Georgia', serif;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-view {
            background: #0a0a0a;
            color: #d4af37;
        }

        .btn-view:hover {
            background: #1a1a1a;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        .btn-approve {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #000000;
            border-color: #10b981;
        }

        .btn-approve:hover {
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .btn-reject {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border-color: #ef4444;
        }

        .btn-reject:hover {
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .empty-state {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border: 2px solid #3a3a3a;
            padding: 4rem 2rem;
            border-radius: 1rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-text {
            color: #b8941f;
            font-size: 1.125rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border: 2px solid #d4af37;
            border-radius: 1rem;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(212, 175, 55, 0.5);
            animation: modalSlideIn 0.3s;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            padding: 2rem;
            border-bottom: 2px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #d4af37;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #b8941f;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: #2a2a2a;
            color: #d4af37;
        }

        .modal-body {
            padding: 2rem;
        }

        .detail-section {
            margin-bottom: 2rem;
        }

        .detail-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .detail-grid {
            display: grid;
            gap: 0.75rem;
        }

        .detail-item {
            display: flex;
            padding: 1rem;
            background: #0a0a0a;
            border-radius: 0.5rem;
            border: 1px solid #2a2a2a;
        }

        .detail-label {
            font-weight: 600;
            color: #b8941f;
            min-width: 140px;
        }

        .detail-value {
            color: #d4af37;
        }

        .modal-actions {
            padding: 1.5rem 2rem;
            border-top: 2px solid #2a2a2a;
            display: flex;
            gap: 1rem;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(400px); opacity: 0; }
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .header-top {
                flex-direction: column;
                align-items: stretch;
            }

            .header-actions {
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .controls-row {
                flex-direction: column;
            }

            .card-actions {
                flex-direction: column;
            }

            .tabs {
                overflow-x: scroll;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <div class="header-top">
                <div class="header-title">
                    <span style="font-size: 3rem;">🏨</span>
                    <div>
                        <h1>Hotel Admin Dashboard</h1>
                        <p>Comprehensive Management System</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="notification-btn" onclick="loadDataFromFirebase()" title="Refresh Data">
                        🔄
                    </button>
                    <button class="notification-btn" onclick="showNotifications()">
                        🔔
                        <span class="notification-badge" id="notificationCount">0</span>
                    </button>
                    <button class="notification-btn" onclick="exportData()" title="Export Data">
                        📥
                    </button>
                    <button onclick="firebase.auth().signOut().then(() => { localStorage.clear(); window.location.href='login.html'; })" style="background:linear-gradient(135deg, #ef4444, #dc2626); color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer; font-size:1.25rem;" title="Logout">
                        🚪
                    </button>
                    <span id="userInfo" style="color:#b8941f; font-size:0.85rem; margin-left:10px;"></span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-value" id="totalPending">0</div>
                    <div class="stat-label">Pending Reviews</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value" id="totalVerified">0</div>
                    <div class="stat-label">Verified Items</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="controls-row">
                <div class="filter-group">
                    <button class="filter-btn active" onclick="filterByCity('all', this)">All Cities</button>
                    <button class="filter-btn" onclick="filterByCity('Bengaluru', this)">Bengaluru</button>
                    <button class="filter-btn" onclick="filterByCity('Mysuru', this)">Mysuru</button>
                    <button class="filter-btn" onclick="filterByCity('Coorg', this)">Coorg</button>
                    <button class="filter-btn" onclick="filterByCity('Hampi', this)">Hampi</button>
                    <button class="filter-btn" onclick="filterByCity('Gokarna', this)">Gokarna</button>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('pending-hotels', this)">
                ⏳ Pending Hotels <span class="badge badge-pending" id="pendingHotelsCount">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('verified-hotels', this)">
                ✅ Verified Hotels <span class="badge badge-verified" id="verifiedHotelsCount">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('pending-bookings', this)">
                ⏳ Pending Bookings <span class="badge badge-pending" id="pendingBookingsCount">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('confirmed-bookings', this)">
                ✅ Confirmed Bookings <span class="badge badge-verified" id="confirmedBookingsCount">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('all-bookings', this)" style="background: #1a1a1a; border: 2px solid #d4af37;">
                📋 ALL Bookings
            </button>
        </div>

        <div id="pending-hotels" class="content active">
            <div class="grid" id="pendingHotelsList"></div>
        </div>

        <div id="verified-hotels" class="content">
            <div class="grid" id="verifiedHotelsList"></div>
        </div>

        <div id="pending-bookings" class="content">
            <div class="grid" id="pendingBookingsList"></div>
        </div>

        <div id="confirmed-bookings" class="content">
            <div class="grid" id="confirmedBookingsList"></div>
        </div>

        <div id="all-bookings" class="content">
            <div class="grid" id="allBookingsList"></div>
        </div>
    </div>

    <div id="modal" class="modal" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Details</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions" id="modalActions"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyBzlUz79MvbV98osbMniaddt3nltmtQyaM",
            authDomain: "book-now-935f2.firebaseapp.com",
            projectId: "book-now-935f2",
            storageBucket: "book-now-935f2.firebasestorage.app",
            messagingSenderId: "61818097207",
            appId: "1:61818097207:web:aade934f0fb93b975c79b2"
        });

        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let data = {
            pendingHotels: [],
            verifiedHotels: [],
            pendingBookings: [],
            confirmedBookings: [],
            allBookings: []
        };
        let currentFilter = {city: 'all'};

        firebase.auth().onAuthStateChanged(async (user) => {
          currentUser = user;
          if (!user) {
            alert('Please login as Admin to access this page');
            window.location.href = 'login.html';
            return;
          }
          
          const userRole = localStorage.getItem('userRole');
          const userEmail = localStorage.getItem('userEmail');
          if (userRole !== 'admin') {
            alert('Access denied. Admins only.');
            window.location.href = 'login.html';
            return;
          }
          
          document.getElementById('userInfo').textContent = '👤 ' + (userEmail || 'Admin');
          await loadDataFromFirebase();
        });

        async function loadDataFromFirebase() {
          console.log('Loading bookings from Firebase...');
          try {
            // Load ALL bookings first (for "All Bookings" tab)
            const allBookingsSnapshot = await db.collection('bookings').get();
            data.allBookings = [];
            allBookingsSnapshot.forEach(doc => {
              data.allBookings.push({ id: doc.id, ...doc.data() });
            });
            console.log('All bookings loaded:', data.allBookings.length);

            // Then load hotel bookings with orderBy
            const bookingsQuery = db.collection('bookings').where('type', '==', 'hotel').orderBy('createdAt', 'desc');
            const snapshot = await bookingsQuery.get();
            
            console.log('Hotel bookings query executed, documents found:', snapshot.size);
            
            data.pendingBookings = [];
            data.confirmedBookings = [];
            
            snapshot.forEach(doc => {
              const booking = { id: doc.id, ...doc.data() };
              console.log('Hotel booking found:', booking);
              if (booking.bookingStatus === 'confirmed') {
                data.confirmedBookings.push(booking);
              } else {
                data.pendingBookings.push(booking);
              }
            });
            
            console.log('Pending hotel bookings:', data.pendingBookings.length);
            console.log('Confirmed hotel bookings:', data.confirmedBookings.length);
            
            showNotification(`Loaded ${data.allBookings.length} total bookings!`);
            render();
            updateStats();
          } catch (error) {
            console.error('Error loading data:', error);
            
            // Try to get all bookings regardless of query
            try {
              const anyBookings = await db.collection('bookings').get();
              data.allBookings = [];
              data.pendingBookings = [];
              data.confirmedBookings = [];
              
              anyBookings.forEach(doc => {
                const booking = { id: doc.id, ...doc.data() };
                data.allBookings.push(booking);
                
                if (booking.type === 'hotel') {
                  if (booking.bookingStatus === 'confirmed') {
                    data.confirmedBookings.push(booking);
                  } else {
                    data.pendingBookings.push(booking);
                  }
                }
              });
              
              showNotification(`Loaded ${data.allBookings.length} bookings (fallback mode)`);
              render();
              updateStats();
            } catch (fallbackError) {
              console.error('Fallback query also failed:', fallbackError);
              showNotification('Error loading bookings. Check Firebase rules.');
              data.allBookings = [];
              render();
              updateStats();
            }
          }
        }

        async function updateBookingStatus(id, status) {
          try {
            await db.collection('bookings').doc(id).update({
              bookingStatus: status
            });
            await loadDataFromFirebase();
          } catch (error) {
            console.error('Error updating booking:', error);
            alert('Error updating booking status');
          }
        }

        window.confirmBooking = async function(id) {
            if (confirm('Confirm this booking?')) {
                await updateBookingStatus(id, 'confirmed');
                showNotification('Booking confirmed! ✅');
            }
        };

        window.cancelBooking = async function(id) {
            if (confirm('Cancel this booking?')) {
                await updateBookingStatus(id, 'cancelled');
                showNotification('Booking cancelled ❌');
            }
        };

        function init() {
            render();
            updateStats();
        }

        function render() {
            renderPendingHotels();
            renderVerifiedHotels();
            renderPendingBookings();
            renderConfirmedBookings();
            renderAllBookings();
            updateCounts();
        }

        function renderAllBookings() {
            const container = document.getElementById('allBookingsList');
            const allBookings = data.allBookings;
            
            if (allBookings.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><div class="empty-icon">📋</div><div class="empty-text">No bookings found. Make sure Firebase Firestore rules allow read access.</div></div>';
                return;
            }

            container.innerHTML = allBookings.map((booking, index) => {
                const typeBadge = booking.type === 'hotel' ? '🏨' : booking.type === 'vehicle' ? '🚗' : booking.type === 'tourism' ? '🏛️' : '📋';
                return `<div class="card" style="animation-delay: ${index * 0.1}s;"><div class="card-header"><div class="card-title">${typeBadge} ${booking.type?.toUpperCase() || 'BOOKING'}</div><span class="badge badge-pending">${booking.bookingStatus || 'unknown'}</span></div><div class="card-body"><div class="info-row"><span class="info-label">ID</span><span class="info-value" style="font-size:11px;">${booking.id}</span></div><div class="info-row"><span class="info-label">User</span><span class="info-value">${booking.userEmail || 'N/A'}</span></div><div class="info-row"><span class="info-label">Hotel</span><span class="info-value">${booking.hotelName || booking.placeName || booking.vehicleName || 'N/A'}</span></div><div class="info-row"><span class="info-label">Amount</span><span class="info-value amount">₹${(booking.totalAmount || 0).toLocaleString('en-IN')}</span></div><div class="info-row"><span class="info-label">Status</span><span class="info-value" style="color:${booking.bookingStatus === 'confirmed' ? '#10b981' : '#f59e0b'};">${booking.bookingStatus || 'N/A'}</span></div></div><div class="card-actions"><button class="btn btn-view" onclick="viewBookingDetails('${booking.id}', 'all')">👁️ View</button><button class="btn btn-approve" onclick="updateBookingStatus('${booking.id}', 'confirmed')">✅ Confirm</button><button class="btn btn-reject" onclick="updateBookingStatus('${booking.id}', 'cancelled')">❌ Cancel</button></div></div>`;
            }).join('');
        }

        function renderConfirmedBookings() {

                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><div class="empty-icon">✅</div><div class="empty-text">No confirmed bookings yet</div></div>';

            }).join('');
        }

        function filterData(dataArray) {
            return dataArray.filter(item => {
                return currentFilter.city === 'all' || item.city === currentFilter.city;
            });
        }

        function filterDataBookings(dataArray) {
            return dataArray.filter(item => {
                return currentFilter.city === 'all' || item.hotelCity === currentFilter.city;
            });
        }

        function filterByCity(city, btn) {
            currentFilter.city = city;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if (btn) btn.classList.add('active');
            render();
        }

        function approveHotel(id) {
            alert('Hotel approval is managed through Business registration. Please check the Business portal.');
        }

        function rejectHotel(id) {
            alert('Hotel rejection is managed through Business registration. Please check the Business portal.');
        }

        function viewHotelDetails(id, type) {
            const hotel = type === 'pending' 
                ? data.pendingHotels.find(h => h.id === id)
                : data.verifiedHotels.find(h => h.id === id);
            
            if (!hotel) return;

            document.getElementById('modalTitle').textContent = hotel.name;
            document.getElementById('modalBody').innerHTML = `
                <div class="detail-section">
                    <div class="section-title">Hotel Information</div>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <span class="detail-label">Hotel Name:</span>
                            <span class="detail-value">${hotel.name}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Owner:</span>
                            <span class="detail-value">${hotel.owner}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Email:</span>
                            <span class="detail-value">${hotel.email}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Phone:</span>
                            <span class="detail-value">${hotel.phone}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Address:</span>
                            <span class="detail-value">${hotel.address}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Total Rooms:</span>
                            <span class="detail-value">${hotel.rooms} Rooms</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Rating:</span>
                            <span class="detail-value rating">⭐ ${hotel.rating}</span>
                        </div>
                    </div>
                </div>
                ${type === 'pending' ? `
                    <div class="detail-section">
                        <div class="section-title">Submitted Documents</div>
                        <div class="detail-item">
                            <span class="detail-label">Document:</span>
                            <span class="detail-value">📄 ${hotel.documents}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Submitted On:</span>
                            <span class="detail-value">${formatDate(hotel.submittedDate)}</span>
                        </div>
                    </div>
                ` : `
                    <div class="detail-section">
                        <div class="section-title">Verification Details</div>
                        <div class="detail-item">
                            <span class="detail-label">Status:</span>
                            <span class="detail-value" style="color: #10b981;">${hotel.status}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Verified On:</span>
                            <span class="detail-value">${formatDate(hotel.verifiedDate)}</span>

                    </div>
                `}

            document.getElementById('modalActions').innerHTML = type === 'pending' ? `
                <button class="btn btn-approve" onclick="approveHotel(${id}); closeModal();">
                    ✅ Approve Hotel
                </button>
                <button class="btn btn-reject" onclick="rejectHotel(${id}); closeModal();">
                    ❌ Reject

            ` : '';
            
            openModal();

        function viewBookingDetails(id, type) {

            if (!booking) return;

            document.getElementById('modalTitle').textContent = `Booking #${id}`;
            document.getElementById('modalBody').innerHTML = `
                <div class="detail-section">
                    <div class="section-title">Guest Information</div>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <span class="detail-label">Name:</span>
                            <span class="detail-value">${booking.userName}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Email:</span>
                            <span class="detail-value">${booking.userEmail}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Phone:</span>
                            <span class="detail-value">${booking.userPhone}</span>
                        </div>
                    </div>
                </div>

                    <div class="section-title">Booking Details</div>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <span class="detail-label">Hotel:</span>
                            <span class="detail-value">${booking.hotelName}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Check-in:</span>
                            <span class="detail-value">${formatDate(booking.checkIn)}</span>

                            <span class="detail-value" style="color: #ffd700; font-size: 1.25rem; font-weight: bold;">₹${booking.totalAmount.toLocaleString('en-IN')}</span>

                            <span class="detail-label">Booking Date:</span>
                            <span class="detail-value">${formatDate(booking.bookingDate)}</span>

            `;
            
            document.getElementById('modalActions').innerHTML = type === 'pending' ? `
                <button class="btn btn-approve" onclick="confirmBooking(${id}); closeModal();">
                    ✅ Confirm Booking
                </button>
                <button class="btn btn-reject" onclick="cancelBooking(${id}); closeModal();">
                    ❌ Cancel
                </button>
            ` : '';
            
            openModal();
        }

        function openModal() {
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function closeModalOnBackdrop(e) {
            if (e.target === document.getElementById('modal')) {
                closeModal();
            }
        }

        function switchTab(tabName, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content').forEach(content => content.classList.remove('active'));
            
            if (btnElement) {
                btnElement.classList.add('active');
            }
            document.getElementById(tabName).classList.add('active');
        }

        function updateStats() {
            const totalPending = data.pendingHotels.length + data.pendingBookings.length;
            const totalVerified = data.verifiedHotels.length + data.confirmedBookings.length;

            document.getElementById('totalPending').textContent = totalPending;
            document.getElementById('totalVerified').textContent = totalVerified;
            document.getElementById('notificationCount').textContent = totalPending;
        }

        function updateCounts() {
            document.getElementById('pendingHotelsCount').textContent = data.pendingHotels.length;
            document.getElementById('verifiedHotelsCount').textContent = data.verifiedHotels.length;
            document.getElementById('pendingBookingsCount').textContent = data.pendingBookings.length;
            document.getElementById('confirmedBookingsCount').textContent = data.confirmedBookings.length;
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return 'N/A';
                return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
            } catch (e) {
                return 'N/A';
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 2rem;
                right: 2rem;
                background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
                color: #000000;
                padding: 1rem 1.5rem;
                border-radius: 0.75rem;
                box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
                z-index: 9999;
                animation: slideIn 0.3s;
                font-weight: 600;
                border: 2px solid #ffd700;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        function showNotifications() {
            const total = data.pendingHotels.length + data.pendingBookings.length;
            alert(`You have ${total} pending items requiring review.\n\n📋 Breakdown:\n• ${data.pendingHotels.length} Pending Hotels\n• ${data.pendingBookings.length} Pending Bookings`);
        }

        function exportData() {
            const exportData = {
                pendingHotels: data.pendingHotels,
                verifiedHotels: data.verifiedHotels,
                pendingBookings: data.pendingBookings,
                confirmedBookings: data.confirmedBookings,
                exportDate: new Date().toISOString(),
                summary: {
                    totalPendingHotels: data.pendingHotels.length,
                    totalVerifiedHotels: data.verifiedHotels.length,
                    totalPendingBookings: data.pendingBookings.length,
                    totalConfirmedBookings: data.confirmedBookings.length
                }
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `hotel-admin-data-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showNotification('Data exported successfully! 📥');
        }

            }
            
            try {

                console.log('Users collection accessible! Total docs:', users.size);
                users.forEach(doc => {
                    console.log('User:', doc.id, doc.data());
                });
            } catch (e) {
                console.error('Error accessing users:', e);
            }
        };

        init();
    </script>
