<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Now</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
  }
  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Playfair Display', serif;
  }
  .scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .letters-row {
    display: flex;
    overflow: hidden;
  }
  .letter {
    display: inline-block;
    font-size: clamp(64px, 14vw, 130px);
    font-weight: 700;
    opacity: 0;
    transform: translateY(80px);
    line-height: 1;
    letter-spacing: 0.06em;
    background: linear-gradient(180deg, #FFE066 0%, #C9A227 45%, #8B6010 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .divider {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #C9A227, transparent);
    margin: 10px auto;
    opacity: 0;
    transition: none;
  }
  .sub-letters-row {
    display: flex;
    overflow: hidden;
  }
  .sub-letter {
    display: inline-block;
    font-size: clamp(36px, 7vw, 68px);
    font-weight: 400;
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.22em;
    opacity: 0;
    transform: translateY(40px);
    line-height: 1;
    background: linear-gradient(180deg, #D4A830 0%, #8B6010 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(11px, 2vw, 13px);
    font-weight: 300;
    letter-spacing: 0.35em;
    color: #7A6020;
    text-transform: uppercase;
    margin-top: 28px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .progress-wrap {
    position: absolute;
    bottom: -60px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
  }
  .progress-bar {
    width: 100%;
    height: 1px;
    background: rgba(201,162,39,0.15);
    border-radius: 1px;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #8B6010, #FFE066, #8B6010);
    border-radius: 1px;
  }
  .fade-out { animation: fadeOut 0.9s ease forwards; }
  @keyframes fadeOut { to { opacity: 0; } }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: #C9A227;
    opacity: 0;
    pointer-events: none;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { opacity: 0;   transform: translateY(0)    scale(1); }
    20%  { opacity: 0.5; }
    80%  { opacity: 0.2; }
    100% { opacity: 0;   transform: translateY(-200px) scale(0.2); }
  }
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="letters-row" id="book-row">
    <span class="letter">B</span>
    <span class="letter">O</span>
    <span class="letter">O</span>
    <span class="letter">K</span>
  </div>
  <div class="divider" id="divider"></div>
  <div class="sub-letters-row" id="now-row">
    <span class="sub-letter">N</span>
    <span class="sub-letter">O</span>
    <span class="sub-letter">W</span>
  </div>
  <div class="tagline" id="tagline">Your Premier Reservation Service</div>
  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
</div>

<script>
  function easeOutBack(t) {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }

  function animateLetter(el, delay, fromY, dur) {
    setTimeout(() => {
      const s = performance.now();
      (function step(now) {
        const t = Math.min((now - s) / dur, 1);
        const e = easeOutBack(t);
        el.style.opacity = Math.min(t * 2.5, 1);
        el.style.transform = 'translateY(' + (fromY * (1 - e)) + 'px)';
        if (t < 1) requestAnimationFrame(step);
        else { el.style.opacity = 1; el.style.transform = 'translateY(0)'; }
      })(s);
    }, delay);
  }

  const bookLetters = document.querySelectorAll('#book-row .letter');
  const nowLetters  = document.querySelectorAll('#now-row .sub-letter');
  const divider     = document.getElementById('divider');
  const tagline     = document.getElementById('tagline');
  const fill        = document.getElementById('progress-fill');
  const scene       = document.getElementById('scene');

  bookLetters.forEach((el, i) => animateLetter(el, 200 + i * 110, 80, 700));

  setTimeout(() => {
    divider.style.transition = 'width 0.6s ease, opacity 0.5s ease';
    divider.style.opacity = '1';
    divider.style.width = '220px';
  }, 850);

  nowLetters.forEach((el, i) => animateLetter(el, 1000 + i * 100, 40, 600));

  setTimeout(() => {
    tagline.style.opacity = '1';
    tagline.style.transform = 'translateY(0)';
  }, 1500);

  for (var i = 0; i < 20; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var x = (Math.random() * 500) - 250;
    var y = (Math.random() * 120) - 60;
    var sz = 1 + Math.random() * 3;
    p.style.cssText = 'left:calc(50% + ' + x + 'px);top:calc(50% + ' + y + 'px);width:' + sz + 'px;height:' + sz + 'px;animation-duration:' + (3 + Math.random() * 4) + 's;animation-delay:' + (1.5 + Math.random() * 2.5) + 's;';
    document.body.appendChild(p);
  }

  var TOTAL = 5000;
  var startT = performance.now();

  (function tick(now) {
    var pct = Math.min(((now - startT) / TOTAL) * 100, 100);
    fill.style.width = pct + '%';
    if (pct < 100) requestAnimationFrame(tick);
  })(startT);

  setTimeout(function() {
    scene.classList.add('fade-out');
    setTimeout(function() {
      window.location.href = 'login.html';
    }, 900);
  }, TOTAL);
</script>
</body>
</html>
