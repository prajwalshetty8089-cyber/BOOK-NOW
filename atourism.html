<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourism Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #0a0a0a;
            color: #d4af37;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.15);
            border: 2px solid #d4af37;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }

        h1 {
            color: #d4af37;
            font-size: 2.2em;
            margin-bottom: 10px;
            text-shadow: 0 2px 8px rgba(212, 175, 55, 0.3);
            letter-spacing: 1px;
        }

        header p {
            color: #b8930f;
            font-size: 1.1em;
            font-style: italic;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #8b7355;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .stat-card:hover::before {
            left: 100%;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            border-color: #d4af37;
            box-shadow: 0 12px 32px rgba(212, 175, 55, 0.25);
        }

        .stat-card h3 {
            color: #b8930f;
            font-size: 0.95em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .stat-card .number {
            font-size: 2.8em;
            font-weight: bold;
            color: #d4af37;
            text-shadow: 0 2px 8px rgba(212, 175, 55, 0.3);
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            color: #b8930f;
            border: 2px solid #8b7355;
            padding: 14px 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-family: 'Georgia', serif;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .tab-btn:hover {
            background: linear-gradient(145deg, #252525, #1a1a1a);
            border-color: #d4af37;
            color: #d4af37;
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: linear-gradient(145deg, #d4af37, #b8930f);
            border-color: #d4af37;
            color: #0a0a0a;
            box-shadow: 0 4px 16px rgba(212, 175, 55, 0.4);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 25px;
            border: 2px solid #8b7355;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #d4af37;
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #8b7355;
        }

        .card-title {
            font-size: 1.4em;
            color: #d4af37;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .badge {
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 0.85em;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .badge.pending {
            background: linear-gradient(145deg, #3d3410, #2a2407);
            color: #ffd700;
            border: 2px solid #b8930f;
        }

        .badge.approved {
            background: linear-gradient(145deg, #1a3d1a, #0f2a0f);
            color: #90ee90;
            border: 2px solid #4caf50;
        }

        .badge.rejected {
            background: linear-gradient(145deg, #3d1010, #2a0707);
            color: #ff6b6b;
            border: 2px solid #c62828;
        }

        .info-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            color: #8b7355;
            font-size: 0.85em;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            color: #d4af37;
            font-size: 1.05em;
            font-weight: 500;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 28px;
            border: 2px solid;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            font-family: 'Georgia', serif;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-approve {
            background: linear-gradient(145deg, #2d5016, #1f3910);
            color: #90ee90;
            border-color: #4caf50;
        }

        .btn-approve:hover {
            transform: scale(1.05);
            background: linear-gradient(145deg, #3d6a1f, #2d5016);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.3);
        }

        .btn-reject {
            background: linear-gradient(145deg, #5d1a1a, #3d1010);
            color: #ff6b6b;
            border-color: #c62828;
        }

        .btn-reject:hover {
            transform: scale(1.05);
            background: linear-gradient(145deg, #7d2525, #5d1a1a);
            box-shadow: 0 6px 20px rgba(198, 40, 40, 0.3);
        }

        .btn-view {
            background: linear-gradient(145deg, #2a3d5d, #1a2d4d);
            color: #87ceeb;
            border-color: #4682b4;
        }

        .btn-view:hover {
            transform: scale(1.05);
            background: linear-gradient(145deg, #3a4d6d, #2a3d5d);
            box-shadow: 0 6px 20px rgba(70, 130, 180, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            padding: 35px;
            border-radius: 12px;
            max-width: 650px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 2px solid #d4af37;
            box-shadow: 0 12px 48px rgba(212, 175, 55, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #8b7355;
        }

        .modal-header h2 {
            color: #d4af37;
            font-size: 1.6em;
        }

        .close-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 2em;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .close-btn:hover {
            transform: scale(1.2);
            color: #ff4444;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #8b7355;
            font-style: italic;
        }

        .empty-state p {
            font-size: 1.2em;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #8b7355;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #d4af37;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.6em;
            }

            .tabs {
                justify-content: center;
            }

            .tab-btn {
                flex: 1;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div>
                    <h1>🏛️ Tourism Admin Dashboard</h1>
                    <p>Manage bookings and business registrations with elegance</p>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span id="userInfo" style="color:#b8930f; font-size:0.9rem;"></span>
                    <button onclick="firebase.auth().signOut().then(() => { localStorage.clear(); window.location.href='login.html'; })" style="background:linear-gradient(135deg, #c62828, #8b0000); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:0.9rem;">🚪 Logout</button>
                </div>
            </div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <h3>Pending Bookings</h3>
                <div class="number" id="pendingBookings">0</div>
            </div>
            <div class="stat-card">
                <h3>Pending Places</h3>
                <div class="number" id="pendingPlaces">0</div>
            </div>
            <div class="stat-card">
                <h3>Approved Today</h3>
                <div class="number" id="approvedToday">0</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('bookings', this)">User Bookings</button>
            <button class="tab-btn" onclick="switchTab('places', this)">Business Places</button>
            <button class="tab-btn" onclick="switchTab('approved', this)">Approved</button>
        </div>

        <div id="bookings" class="tab-content active">
            <div id="bookingsList"></div>
        </div>

        <div id="places" class="tab-content">
            <div id="placesList"></div>
        </div>

        <div id="approved" class="tab-content">
            <div id="approvedList"></div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Details</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyBzlUz79MvbV98osbMniaddt3nltmtQyaM",
            authDomain: "book-now-935f2.firebaseapp.com",
            projectId: "book-now-935f2",
            storageBucket: "book-now-935f2.firebasestorage.app",
            messagingSenderId: "61818097207",
            appId: "1:61818097207:web:aade934f0fb93b975c79b2"
        });

        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let bookings = [];
        let places = [];
        let approved = [];

        firebase.auth().onAuthStateChanged(async (user) => {
          currentUser = user;
          if (!user) {
            alert('Please login as Admin to access this page');
            window.location.href = 'login.html';
            return;
          }
          
          const userRole = localStorage.getItem('userRole');
          const userEmail = localStorage.getItem('userEmail');
          if (userRole !== 'admin') {
            alert('Access denied. Admins only.');
            window.location.href = 'login.html';
            return;
          }
          
          document.getElementById('userInfo').textContent = '👤 ' + (userEmail || 'Admin');
          await loadDataFromFirebase();
        });

        async function loadDataFromFirebase() {
          try {
            const bookingsQuery = db.collection('bookings').where('type', '==', 'tourism').orderBy('createdAt', 'desc');
            const snapshot = await bookingsQuery.get();
            
            bookings = [];
            approved = [];
            
            snapshot.forEach(docSnap => {
              const booking = { id: docSnap.id, ...docSnap.data() };
              if (booking.bookingStatus === 'approved') {
                approved.push({...booking, type: 'booking'});
              } else {
                bookings.push(booking);
              }
            });
            
            updateAll();
          } catch (error) {
            console.error('Error loading data:', error);
            updateAll();
          }
        }

        async function updateBookingStatus(id, status) {
          try {
            await db.collection('bookings').doc(id).update({
              bookingStatus: status
            });
            await loadDataFromFirebase();
          } catch (error) {
            console.error('Error updating booking:', error);
            alert('Error updating booking status');
          }
        }

        function approveItem(type, id) {
            if (!confirm('Are you sure you want to approve this booking?')) return;
            updateBookingStatus(id, 'approved');
            alert('Booking approved successfully!');
        }

        function rejectItem(type, id) {
            if (!confirm('Are you sure you want to reject this booking?')) return;
            updateBookingStatus(id, 'rejected');
            alert('Booking rejected.');
        }

        function updateStats() {
            document.getElementById('pendingBookings').textContent = bookings.filter(b => b.status === 'pending').length;
            document.getElementById('pendingPlaces').textContent = places.filter(p => p.status === 'pending').length;
            
            const today = new Date().toISOString().split('T')[0];
            const approvedToday = approved.filter(a => a.approvedDate === today).length;
            document.getElementById('approvedToday').textContent = approvedToday;
        }

        function renderBookings() {
            const list = document.getElementById('bookingsList');
            const pending = bookings;
            
            if (pending.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>No pending bookings</p></div>';
                return;
            }

            list.innerHTML = pending.map(b => `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Booking #${b.id.substring(0, 8)}</span>
                        <span class="badge pending">PENDING</span>
                    </div>
                    <div class="info-row">
                        <div class="info-item">
                            <span class="info-label">Email</span>
                            <span class="info-value">${b.userEmail || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Place</span>
                            <span class="info-value">${b.placeName || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">People</span>
                            <span class="info-value">${b.numPeople || 1} persons</span>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="info-item">
                            <span class="info-label">Visit Date</span>
                            <span class="info-value">${b.visitDate || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Guide</span>
                            <span class="info-value">${b.guideOption ? 'Yes' : 'No'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Amount</span>
                            <span class="info-value">₹${(b.totalAmount || 0).toLocaleString('en-IN')}</span>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-approve" onclick="approveItem('booking', '${b.id}')">✓ Approve</button>
                        <button class="btn-reject" onclick="rejectItem('booking', '${b.id}')">✗ Reject</button>
                    </div>
                </div>
            `).join('');
        }

        function renderPlaces() {
            const list = document.getElementById('placesList');
            const pending = places;
            
            if (pending.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>No pending places</p></div>';
                return;
            }

            list.innerHTML = pending.map(p => `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">${p.placeName}</span>
                        <span class="badge pending">PENDING</span>
                    </div>
                    <div class="info-row">
                        <div class="info-item">
                            <span class="info-label">Business</span>
                            <span class="info-value">${p.businessName || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Owner</span>
                            <span class="info-value">${p.businessOwner || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Email</span>
                            <span class="info-value">${p.businessEmail || 'N/A'}</span>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="info-item">
                            <span class="info-label">Location</span>
                            <span class="info-value">${p.location || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Category</span>
                            <span class="info-value">${p.category || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Capacity</span>
                            <span class="info-value">${p.capacity || 'N/A'} guests</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderApproved() {
            const list = document.getElementById('approvedList');
            
            if (approved.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>No approved items yet</p></div>';
                return;
            }

            list.innerHTML = approved.map(item => {
                return `
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">Booking #${item.id.substring(0, 8)}</span>
                            <span class="badge approved">APPROVED</span>
                        </div>
                        <div class="info-row">
                            <div class="info-item">
                                <span class="info-label">Email</span>
                                <span class="info-value">${item.userEmail || 'N/A'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Place</span>
                                <span class="info-value">${item.placeName || 'N/A'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Amount</span>
                                <span class="info-value">₹${(item.totalAmount || 0).toLocaleString('en-IN')}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            if (btn) btn.classList.add('active');
            document.getElementById(tab).classList.add('active');
        }

        function approveItem(type, id) {
            if (!confirm('Are you sure you want to approve this item?')) return;
            
            const today = new Date().toISOString().split('T')[0];
            
            if (type === 'booking') {
                const idx = bookings.findIndex(b => b.id === id);
                if (idx !== -1) {
                    bookings[idx].status = 'approved';
                    bookings[idx].approvedDate = today;
                    approved.push({...bookings[idx], type: 'booking'});
                }
            } else {
                const idx = places.findIndex(p => p.id === id);
                if (idx !== -1) {
                    places[idx].status = 'approved';
                    places[idx].approvedDate = today;
                    approved.push({...places[idx], type: 'place'});
                }
            }
            
            updateAll();
            alert('Item approved successfully!');
        }

        function rejectItem(type, id) {
            if (!confirm('Are you sure you want to reject this item?')) return;
            
            if (type === 'booking') {
                const idx = bookings.findIndex(b => b.id === id);
                if (idx !== -1) bookings[idx].status = 'rejected';
            } else {
                const idx = places.findIndex(p => p.id === id);
                if (idx !== -1) places[idx].status = 'rejected';
            }
            
            updateAll();
            alert('Item rejected.');
        }

        function viewDetails(type, id) {
            const modal = document.getElementById('detailModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            if (type === 'booking') {
                const booking = bookings.find(b => b.id === id);
                title.textContent = `Booking Details - #${booking.id}`;
                body.innerHTML = `
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Booking ID</span>
                        <span class="info-value">${booking.id}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">User Name</span>
                        <span class="info-value">${booking.userName}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Email</span>
                        <span class="info-value">${booking.userEmail}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Phone</span>
                        <span class="info-value">${booking.userPhone}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Place</span>
                        <span class="info-value">${booking.placeName}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Location</span>
                        <span class="info-value">${booking.location}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Check-in Date</span>
                        <span class="info-value">${booking.checkIn}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Check-out Date</span>
                        <span class="info-value">${booking.checkOut}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Number of Guests</span>
                        <span class="info-value">${booking.guests}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Total Amount</span>
                        <span class="info-value">$${booking.amount}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Booking Date</span>
                        <span class="info-value">${booking.bookingDate}</span>
                    </div>
                `;
            } else {
                const place = places.find(p => p.id === id);
                title.textContent = `Place Details - ${place.placeName}`;
                body.innerHTML = `
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Place ID</span>
                        <span class="info-value">${place.id}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Place Name</span>
                        <span class="info-value">${place.placeName}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Business Name</span>
                        <span class="info-value">${place.businessName}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Business Owner</span>
                        <span class="info-value">${place.businessOwner}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Business Email</span>
                        <span class="info-value">${place.businessEmail}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Business Phone</span>
                        <span class="info-value">${place.businessPhone}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Location</span>
                        <span class="info-value">${place.location}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Category</span>
                        <span class="info-value">${place.category}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Price per Night</span>
                        <span class="info-value">$${place.pricePerNight}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Capacity</span>
                        <span class="info-value">${place.capacity} guests</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Amenities</span>
                        <span class="info-value">${place.amenities.join(', ')}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Description</span>
                        <span class="info-value">${place.description}</span>
                    </div>
                    <div class="info-item" style="margin-bottom: 15px;">
                        <span class="info-label">Submitted Date</span>
                        <span class="info-value">${place.submittedDate}</span>
                    </div>
                `;
            }
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function updateAll() {
            renderBookings();
            renderPlaces();
            renderApproved();
            updateStats();
        }

        // Close modal when clicking outside
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Initialize
        updateAll();
    </script>
</body>
</html>
